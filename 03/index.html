<!DOCTYPE html>
<html lang="en"> <!-- lang is an attribute - for extra information. "en" is a value of attr. -->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folder 3</title>
</head>

<body>
    <!-- Unordered List -->
    <ul type="none"> <!-- type is an attribute - for extra information. "none" is a value of attr. -->
        <li>
            <h2>Want to buy:</h2>
        </li>
        <li>Bread</li>
        <li>Butter</li>
        <li>Jam</li>
    </ul>

    <!-- Ordered List -->
    <ol type="A"> <!-- type is an attribute - for extra information. "A" is a value of attr.-->
        <li>Frooti</li>
        <li>Samosa</li>
        <li>Bhel</li>
    </ol>

    <!-- Anchor Element - for links -->
    <a href="https://www.google.com">Google</a>

    <br> <!-- Line breaking tag -->

    <a href="../01/index.html">HTML</a>

    <br>
    <b>This is bold</b>
    <br>
    <i>This is italic</i>
    <br>
    <u>This is underlined</u>
    <br>

    <!-- Image -->
    <img src="https://tse1.mm.bing.net/th/id/OIP.kKTrGsztXlGxt7ujPfL84AHaHa?rs=1&pid=ImgDetMain&o=7&rm=3"
        alt="website image" height="100px" width="100px">

</html>
