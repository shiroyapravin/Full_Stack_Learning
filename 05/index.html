<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folder 5</title>
</head>

<body>
    <!-- Table -->
    <table border="black">
        <caption>Food Menu</caption>
        <!-- Table header -->
        <thead>
            <tr>
                <th>Item</th>
                <th>Price</th>
            </tr>
        </thead>

        <!-- Table body -->
        <tbody>
            <tr>
                <td>Chips</td>
                <td>10</td>
            </tr>
            <tr>
                <td>Frooti</td>
                <td>12</td>
            </tr>
            <tr>
                <td>Samosa</td>
                <td>20</td>
            </tr>
        </tbody>
    </table>

    <br>
    <br>

    <!-- Colspan & Rowspan in Table -->
    <table border="black">
        <caption>Food Menu</caption>
        <thead>
            <tr>
                <th rowspan="2">Item</th>
                <th colspan="2">Price</th>
            </tr>
            <tr>
                <th>INR</th>
                <th>USD</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Chips</td>
                <td>10</td>
                <td>0.14</td>
            </tr>
            <tr>
                <td>Frooti</td>
                <td>12</td>
                <td>0.17</td>
            </tr>
            <tr>
                <td>Samosa</td>
                <td>20</td>
                <td>0.28</td>
            </tr>
        </tbody>
    </table>

    <br>
    <br>

    <!-- Form -->
    <form action="/action">
        <!-- Input -->
        <div>
            <Label for="username">Username :</Label>
            <input type="text" id="username" name="user" placeholder="enter username">
        </div>
        <div>
            <Label for="password">Password :</Label>
            <input type="password" id="password" name="pass" placeholder="enter password">
        </div>

        <!-- Button -->
        <div>
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </div>

        <input type="button" value="Click Me">
        <input type="submit" value="Click Me to Submit">

        <!-- Checkbox -->
        <div>
            <input type="checkbox" name="age" id="age" checked>
            <label for="age">I am 18+</label>
        </div>

        <!-- Radio button -->
        <div>
            <input type="radio" name="gender" id="male" value="male">
            <label for="male">Male</label>
            <input type="radio" name="gender" id="female" value="female">
            <label for="female">Female</label>
        </div>

        <!-- Dropdown -->
        <div>
            Choose your profession :
            <select name="profession" id="profession">
                <option value="">Select</option>
                <option value="stud">Student</option>
                <option value="dev">Developer</option>
            </select>
        </div>

        <!-- Range -->
        <div>
            <label for="volume">Volume</label>
            <input type="range" name="volume" id="volume" min="0" max="100" step="10" value="70">
        </div>

        <!-- Textare -->
         <label for="feedback">Please give your feedback :</label>
         <textarea name="feedback" id="feedback"></textarea>
    </form>

    <hr>

    <form action="https://www.youtube.com/results">
        <input type="text" placeholder="Search in YouTube" name="search_query">
        <button>Search</button>
    </form>
</body>

</html>
