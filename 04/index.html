<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folder 4</title>
</head>

<body>
    <!-- Header of the page -->
    <header>
        <!-- Block Element -->
        <h1>Hello World!</h1>
        <p>This is a paragraph.</p>

        <!-- Navbar of the page -->
        <nav></nav>
    </header>

    <!-- Main part of the page -->
    <main>
        <!-- Inline Element -->
        <a href="www.google.com">Google</a>
        <img src="" alt="This is image.">

        <!-- Div Element -->
        <div>
            <a href="www.google.com">Google</a>
            <a href="www.facebook.com">Facebook</a>
        </div>
        <a href="www.youtube.com">YouTube</a>
    </main>

    <hr> <!-- Break line with horizontal line -->

    <!-- Footer of the page -->
    <footer>
        <!-- Span Element -->
        <span>
            <a href="">LINK 1</a>
            <a href="">LINK 2</a>
        </span>

        <!-- Subscript & Superscript Tag -->
        <p>a<sup>2</sup> = b<sup>2</sup> + c<sup>2</sup></p>
        <p>H<sub>2</sub>O</p>
    </footer>

    <!-- Other semantic tage -->
    <article></article>
    <section></section>
    <aside></aside>

    <hr>

    <!-- HTML Entities -->
    <h2>a &lt; b</h2>
    <h2>Hello&nbsp;&nbsp;&nbsp;&nbsp;World</h2>
    <h2>c &gt; d</h2>
    <h2>&quot; This is a quot. &quot;</h2>
    <h2>&hearts; &hellip; &exponentiale; etc...</h2>

    <a href="https://www.freeformatter.com/html-entities.html">Click here for more entities</a>

    <a href="https://docs.emmet.io/cheat-sheet/">For emmet cheat-sheet</a>
</body>

</html>
