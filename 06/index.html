<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folder 6</title>
    <link rel="stylesheet" href="style.css">
    <style>
        h2 {
            color: yellowgreen;
            background-color: black;
        }
    </style>
</head>

<body>
    <!-- Inline style -->
    <h1 style="color: red;">Hello World</h1>
    <h1 style="color: red;">Welcome!!</h1>
    <p style="color: blue;">This is a paragraph.</p>
    
    <br>
    
    <!-- Style tag in head for styling -->
    <h2>How</h2>
    <h2>Are</h2>
    <h2>You?</h2>
    
    <br>
    
    <!-- External stylesheet linked in head -->
    <div>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Eum, incidunt.</p>
        <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Nisi, quidem.</p>
    </div>
    
    <button>Help</button>

    <br>
    <br>
    <br>

    <span><p>Hello, How are you?</p></span>
    <span><p>I am fine.</p></span>
</body>

</html>
